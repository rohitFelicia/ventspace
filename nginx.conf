server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip: compresses 1.4MB JS bundle down to ~350KB
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/html
        text/plain
        text/css
        application/javascript
        application/json
        application/x-javascript
        text/javascript;

    # HTML: no-cache so users always get the latest app
    location ~* \.html$ {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Link "<https://firestore.googleapis.com>; rel=preconnect, <https://identitytoolkit.googleapis.com>; rel=preconnect, <https://www.googleapis.com>; rel=preconnect";
        expires 0;
    }

    # Hashed assets: cache 1 year (content hash changes on every deploy)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
